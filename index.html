<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mermaid Pad</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
            secondary: { DEFAULT: 'hsl(var(--secondary))', foreground: 'hsl(var(--secondary-foreground))' },
            muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
            accent: { DEFAULT: 'hsl(var(--accent))', foreground: 'hsl(var(--accent-foreground))' },
            destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
            card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' },
          },
          borderRadius: {
            lg: 'var(--radius)',
            md: 'calc(var(--radius) - 2px)',
            sm: 'calc(var(--radius) - 4px)',
          },
        },
      },
    }
  </script>
  <style>
    :root {
      --radius: 0.5rem;
      --background: 0 0% 100%;
      --foreground: 240 10% 3.9%;
      --card: 0 0% 100%;
      --card-foreground: 240 10% 3.9%;
      --primary: 240 5.9% 10%;
      --primary-foreground: 0 0% 98%;
      --secondary: 240 4.8% 95.9%;
      --secondary-foreground: 240 5.9% 10%;
      --muted: 240 4.8% 95.9%;
      --muted-foreground: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%;
      --accent-foreground: 240 5.9% 10%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 5.9% 90%;
      --input: 240 5.9% 90%;
      --ring: 240 5.9% 10%;
    }

    .dark {
      --background: 240 10% 3.9%;
      --foreground: 0 0% 98%;
      --card: 240 10% 3.9%;
      --card-foreground: 0 0% 98%;
      --primary: 0 0% 98%;
      --primary-foreground: 240 5.9% 10%;
      --secondary: 240 3.7% 15.9%;
      --secondary-foreground: 0 0% 98%;
      --muted: 240 3.7% 15.9%;
      --muted-foreground: 240 5% 64.9%;
      --accent: 240 3.7% 15.9%;
      --accent-foreground: 0 0% 98%;
      --destructive: 0 62.8% 30.6%;
      --destructive-foreground: 0 0% 98%;
      --border: 240 3.7% 15.9%;
      --input: 240 3.7% 15.9%;
      --ring: 240 4.9% 83.9%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* Switch - shadcn style */
    .switch {
      position: relative;
      width: 2.25rem;
      height: 1.25rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
      border-radius: 9999px;
      border: 2px solid transparent;
      background: hsl(var(--input));
      transition: background-color 0.15s, color 0.15s;
    }
    .switch.checked {
      background: hsl(var(--primary));
    }
    .switch-thumb {
      pointer-events: none;
      display: block;
      width: 1rem;
      height: 1rem;
      border-radius: 9999px;
      background: hsl(var(--background));
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
      transition: transform 0.15s;
      transform: translateX(0px);
    }
    .switch.checked .switch-thumb {
      transform: translateX(1rem);
    }

    /* Divider drag handle */
    .divider {
      width: 3px;
      cursor: col-resize;
      transition: background-color 0.2s;
    }
    .divider:hover, .divider.active {
      background: hsl(var(--ring));
    }

    /* Preview canvas */
    #preview-canvas {
      transform-origin: 0 0;
      position: absolute;
      top: 0;
      left: 0;
      display: inline-block;
    }
    #preview-canvas svg {
      display: block;
    }

    /* Textarea */
    textarea {
      tab-size: 2;
    }
    textarea::placeholder {
      color: hsl(var(--muted-foreground));
    }
  </style>
</head>
<body class="h-screen flex flex-col bg-background text-foreground overflow-hidden">

  <!-- Header -->
  <header class="flex items-center justify-between h-12 px-4 border-b border-border bg-background shrink-0">
    <h1 class="text-sm font-semibold tracking-tight flex items-center gap-2">
      <img src="https://mermaid.js.org/favicon.svg" class="w-5 h-5" alt="Mermaid"/>
      Mermaid Pad
    </h1>
    <div class="flex items-center gap-3">
      <!-- Hand-drawn toggle -->
      <label class="flex items-center gap-2 cursor-pointer select-none">
        <span class="text-xs text-muted-foreground">Hand drawn</span>
        <div class="switch checked" id="handDrawnSwitch" role="switch" aria-checked="true" tabindex="0">
          <span class="switch-thumb"></span>
        </div>
        <input type="checkbox" id="handDrawnToggle" class="sr-only" checked>
      </label>
      <!-- Theme toggle (shadcn ghost button style) -->
      <button
        id="themeToggle"
        title="Toggle theme"
        class="inline-flex items-center justify-center rounded-md text-sm font-medium h-9 w-9 border border-input bg-background hover:bg-accent hover:text-accent-foreground transition-colors"
      ></button>
    </div>
  </header>

  <!-- Main container -->
  <div class="flex flex-1 overflow-hidden">

    <!-- Editor pane -->
    <div class="flex flex-col" id="editorPane" style="width: 40%">
      <div class="px-3 py-1.5 text-[11px] font-semibold uppercase tracking-widest text-muted-foreground border-b border-border bg-muted/50 shrink-0">
        Editor
      </div>
      <textarea
        id="editor"
        spellcheck="false"
        placeholder="Enter Mermaid diagram code here..."
        class="flex-1 p-4 bg-background text-foreground border-none outline-none resize-none font-mono text-sm leading-relaxed"
      >graph TD
    A[Start] --> B{Decision}
    B -->|Yes| C[Do something]
    B -->|No| D[Do something else]
    C --> E[End]
    D --> E</textarea>
    </div>

    <!-- Resizable divider -->
    <div class="divider bg-border" id="divider"></div>

    <!-- Preview pane -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <div class="px-3 py-1.5 text-[11px] font-semibold uppercase tracking-widest text-muted-foreground border-b border-border bg-muted/50 shrink-0">
        Preview
      </div>
      <div id="preview" class="flex-1 overflow-hidden relative bg-card cursor-grab">
        <div id="preview-canvas"></div>
        <!-- Zoom controls (shadcn outline button style) -->
        <div class="absolute bottom-3 right-3 flex gap-1 z-10">
          <button id="zoomIn" title="Zoom in"
            class="inline-flex items-center justify-center rounded-md text-sm font-medium h-8 w-8 border border-input bg-background shadow-sm hover:bg-accent hover:text-accent-foreground transition-colors">
            +
          </button>
          <span id="zoomLevel"
            class="inline-flex items-center justify-center rounded-md text-xs h-8 px-2.5 border border-input bg-background shadow-sm select-none tabular-nums">
            100%
          </span>
          <button id="zoomOut" title="Zoom out"
            class="inline-flex items-center justify-center rounded-md text-sm font-medium h-8 w-8 border border-input bg-background shadow-sm hover:bg-accent hover:text-accent-foreground transition-colors">
            &minus;
          </button>
          <button id="zoomFit" title="Fit to view"
            class="inline-flex items-center justify-center rounded-md text-xs font-medium h-8 px-2.5 border border-input bg-background shadow-sm hover:bg-accent hover:text-accent-foreground transition-colors">
            Fit
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Error style (injected into preview) -->
  <template id="error-template">
    <div class="text-destructive bg-destructive/10 p-4 rounded-lg font-mono text-xs whitespace-pre-wrap max-w-full border border-destructive/20"></div>
  </template>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    // Theme & look management
    const root = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    const handDrawnToggle = document.getElementById('handDrawnToggle');
    const handDrawnSwitch = document.getElementById('handDrawnSwitch');
    const THEME_KEY = 'mermaid-pad-theme';
    const LOOK_KEY = 'mermaid-pad-look';

    function getTheme() {
      return root.classList.contains('dark') ? 'dark' : 'light';
    }

    function isHandDrawn() {
      return handDrawnToggle.checked;
    }

    function updateSwitchVisual() {
      if (isHandDrawn()) {
        handDrawnSwitch.classList.add('checked');
        handDrawnSwitch.setAttribute('aria-checked', 'true');
      } else {
        handDrawnSwitch.classList.remove('checked');
        handDrawnSwitch.setAttribute('aria-checked', 'false');
      }
    }

    function initMermaid() {
      const theme = getTheme() === 'dark' ? 'dark' : 'default';
      const look = isHandDrawn() ? 'handDrawn' : 'classic';
      mermaid.initialize({ startOnLoad: false, look, theme });
    }

    function applyTheme(theme) {
      root.classList.toggle('dark', theme === 'dark');
      localStorage.setItem(THEME_KEY, theme);
      // Sun/Moon SVG icons
      if (theme === 'dark') {
        themeToggle.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;
      } else {
        themeToggle.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;
      }
      initMermaid();
    }

    // Restore saved preferences
    const saved = localStorage.getItem(THEME_KEY);
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const savedLook = localStorage.getItem(LOOK_KEY);
    handDrawnToggle.checked = savedLook !== 'classic';
    updateSwitchVisual();
    applyTheme(saved || (prefersDark ? 'dark' : 'light'));

    themeToggle.addEventListener('click', () => {
      applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
      renderDiagram();
    });

    // Switch click & keyboard
    handDrawnSwitch.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      handDrawnToggle.checked = !handDrawnToggle.checked;
      updateSwitchVisual();
      localStorage.setItem(LOOK_KEY, isHandDrawn() ? 'handDrawn' : 'classic');
      initMermaid();
      renderDiagram();
    });
    handDrawnSwitch.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        handDrawnSwitch.click();
      }
    });

    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('preview-canvas');
    const zoomLevelEl = document.getElementById('zoomLevel');
    let debounceTimer;
    let renderCount = 0;

    // Zoom & pan state
    let scale = 1;
    let panX = 0;
    let panY = 0;
    let isPanning = false;
    let panStartX = 0;
    let panStartY = 0;
    let panStartPanX = 0;
    let panStartPanY = 0;

    function applyTransform() {
      canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
      zoomLevelEl.textContent = Math.round(scale * 100) + '%';
    }

    function zoomTo(newScale, centerX, centerY) {
      const prevScale = scale;
      scale = Math.min(Math.max(newScale, 0.1), 5);
      panX = centerX - (centerX - panX) * (scale / prevScale);
      panY = centerY - (centerY - panY) * (scale / prevScale);
      applyTransform();
    }

    function fitToView() {
      const svgEl = canvas.querySelector('svg');
      if (!svgEl) return;
      const pw = preview.clientWidth;
      const ph = preview.clientHeight;
      const sw = svgEl.width.baseVal.value || svgEl.getBoundingClientRect().width / scale;
      const sh = svgEl.height.baseVal.value || svgEl.getBoundingClientRect().height / scale;
      if (!sw || !sh) return;
      const padding = 40;
      scale = Math.min((pw - padding) / sw, (ph - padding) / sh, 2);
      panX = (pw - sw * scale) / 2;
      panY = (ph - sh * scale) / 2;
      applyTransform();
    }

    // Wheel zoom (centered on cursor)
    preview.addEventListener('wheel', (e) => {
      e.preventDefault();
      const rect = preview.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
      zoomTo(scale * factor, cx, cy);
    }, { passive: false });

    // Mouse panning
    preview.addEventListener('mousedown', (e) => {
      if (e.button !== 0) return;
      isPanning = true;
      panStartX = e.clientX;
      panStartY = e.clientY;
      panStartPanX = panX;
      panStartPanY = panY;
      preview.classList.add('!cursor-grabbing');
    });

    window.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      panX = panStartPanX + (e.clientX - panStartX);
      panY = panStartPanY + (e.clientY - panStartY);
      applyTransform();
    });

    window.addEventListener('mouseup', () => {
      if (isPanning) {
        isPanning = false;
        preview.classList.remove('!cursor-grabbing');
      }
    });

    // Zoom buttons
    document.getElementById('zoomIn').addEventListener('click', () => {
      const cx = preview.clientWidth / 2;
      const cy = preview.clientHeight / 2;
      zoomTo(scale * 1.25, cx, cy);
    });

    document.getElementById('zoomOut').addEventListener('click', () => {
      const cx = preview.clientWidth / 2;
      const cy = preview.clientHeight / 2;
      zoomTo(scale / 1.25, cx, cy);
    });

    document.getElementById('zoomFit').addEventListener('click', fitToView);

    async function renderDiagram() {
      const code = editor.value.trim();
      if (!code) {
        canvas.innerHTML = '';
        return;
      }

      try {
        const id = `mermaid-diagram-${renderCount++}`;
        const { svg } = await mermaid.render(id, code);
        canvas.innerHTML = svg;
        requestAnimationFrame(fitToView);
      } catch (err) {
        canvas.innerHTML = `<div class="text-destructive bg-destructive/10 p-4 rounded-lg font-mono text-xs whitespace-pre-wrap max-w-full border border-destructive/20">${err.message || err}</div>`;
      }
    }

    editor.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(renderDiagram, 300);
    });

    // Resizable divider
    const divider = document.getElementById('divider');
    const editorPane = document.getElementById('editorPane');
    let dragging = false;

    divider.addEventListener('mousedown', () => {
      dragging = true;
      divider.classList.add('active');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });

    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      const containerWidth = editorPane.parentElement.offsetWidth;
      const pct = (e.clientX / containerWidth) * 100;
      if (pct > 15 && pct < 85) {
        editorPane.style.width = pct + '%';
      }
    });

    window.addEventListener('mouseup', () => {
      if (dragging) {
        dragging = false;
        divider.classList.remove('active');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      }
    });

    // Tab key support in textarea
    editor.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = editor.selectionStart;
        const end = editor.selectionEnd;
        editor.value = editor.value.substring(0, start) + '  ' + editor.value.substring(end);
        editor.selectionStart = editor.selectionEnd = start + 2;
      }
    });

    // Initial render
    renderDiagram();
  </script>
</body>
</html>
